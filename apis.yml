name: Healthpeak Properties
description: |
  Healthpeak Properties (NYSE: DOC) is an S&P 500 healthcare real estate
  investment trust (REIT) that owns, operates, and develops real estate for
  healthcare discovery and outpatient care — concentrated in lab/life-sciences,
  outpatient medical, and continuing care retirement community (CCRC) senior
  housing segments. The company tagline is "Where Discovery and Outpatient
  Care Thrive."

  Originally founded as HCP Inc. in 1985, the company rebranded to Healthpeak
  Properties in 2019. On March 1, 2024, Healthpeak completed an all-stock
  merger of equals with Physicians Realty Trust, combining two of the largest
  outpatient medical real estate platforms in the United States and adopting
  the new NYSE ticker DOC (previously PEAK).

  Healthpeak's portfolio spans roughly 700 properties nationwide, with lab
  concentrations in the South San Francisco, Boston, and San Diego clusters
  (including Torrey Pines Science Park and The Cove at Oyster Point) and
  outpatient medical assets clustered on or near top-ranked hospital
  campuses such as Medical City Dallas. The company reports that
  approximately 150,000 scientists, researchers, physicians, and healthcare
  professionals work in its buildings.

  As a healthcare REIT, Healthpeak does not publish a public developer API,
  SDK, OpenAPI specification, or technical integration surface. Its public
  digital footprint is limited to corporate marketing, an investor
  relations site, SEC filings, ESG/sustainability reporting, and a press
  room. Tenant-facing operational systems (work orders, building access,
  energy reporting) are not exposed externally.
